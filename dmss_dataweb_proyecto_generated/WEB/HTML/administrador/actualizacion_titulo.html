
      <!DOCTYPE html>
      <html lang="es">
      <head>
        <meta charset="UTF-8">
        <title>Actualizacion de Titulo</title>
        <link rel="stylesheet" href="../styles.css">

        <style>
          .form-input {
            width: 100%;
            padding: 10px 14px;
            margin-top: 6px;
            margin-bottom: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            background-color: #f9f9f9;
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.3s ease;
          }

          .form-input:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 5px rgba(76, 175, 80, 0.5);
            background-color: #fff;
          }
        </style>

        <script>
          function mostrarMensaje() {
            const mensaje = document.getElementById("mensajeExito");
            mensaje.style.display = "block";
            setTimeout(() => {
              window.location.href = "index_Administrador.html";
            }, 5000);
          }

          function cerrarMensaje() {
            window.location.href = "index_Administrador.html";
          }
        </script>
      </head>

      <body>
        <div class="header">
          <h1>Universidad de Extremadura Data Management</h1>
        </div>

        <div class="subheader">
          <h2>Actualiza la informacion de Titulo</h2>
        </div>

        <div class="container">
          <div class="main-content">
            <div class="content">
              <h3>Campos para actualizar:</h3>
              <form method="POST" action="administrador/actualizar/titulo.html" onsubmit="event.preventDefault(); mostrarMensaje();">
                  <div class="field">
                      <p>
                        Nombre
                         (String) 
                        
                        
                      </p>

                        <label for="Nombre">Actualizar Nombre:</label>
                          <input type="text" class="form-input" id="Nombre_input" name="Nombre" 
                                 value="Titulo">


                      <p>
                        Creditos totales
                        
                         (Integer) 
                        
                      </p>


                        <label for="Creditos totales">Actualizar Creditos totales:</label>
                          <input type="number" class="form-input" id="Creditos totales_input" name="Creditos totales" 
                                 value="invalid">


                      <p>
                        <label for="ref_Asignatura">Seleccione un Asignatura:</label>
                        <select class="form-input" name="ref_Asignatura" id="ref_Asignatura">
                          <option value="Asignatura">Asignatura</option>
                        </select>
                      </p>
                      <p>
                        <label for="ref_Estudiante">Seleccione un Estudiante:</label>
                        <select class="form-input" name="ref_Estudiante" id="ref_Estudiante">
                          <option value="Estudiante">Estudiante</option>
                        </select>
                      </p>
                      <p>
                        <label for="ref_Profesor">Seleccione un Profesor:</label>
                        <select class="form-input" name="ref_Profesor" id="ref_Profesor">
                          <option value="Profesor">Profesor</option>
                        </select>
                      </p>
                  </div>

                <div class="actions">
                  <button type="submit" class="button">Actualizar</button>
                </div>
				<button onclick="window.history.back()" class="button">Volver</button>
              </form>
            </div>
          </div>

          <div class="sidebar social">
            <h3>Redes Sociales:</h3>
            <div class="twitter-timeline-container">
              <a class="twitter-timeline" 
                 data-width="100%" 
                 data-height="400"
                 href="https://twitter.com/infouex?ref_src=twsrc%5Etfw">Tweets by infouex</a>
            </div>
            <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
          </div>
        </div>

        <div id="mensajeExito" class="mensaje-exito">
          <span class="cerrar" onclick="cerrarMensaje()">Ã—</span>
          <p><strong>La instancia ha sido actualizada con Ã©xito.</strong></p>
        </div>

          AplicaciÃ³n generada automÃ¡ticamente.
        </div>
      </body>
      </html>
