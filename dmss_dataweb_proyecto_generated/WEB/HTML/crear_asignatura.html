<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Crear nuevo Asignatura</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="header">
    <h1>Crear nuevo Asignatura</h1>
  </div>

  <form action="guardar_asignatura.html" method="post">
    <div class="content">
      <h3>Introduce los campos:</h3>
        <div class="field">
          <h3>Asignatura:</h3>
            <p>
              <label for="01">01:</label>
                <input type="number" name="01" id="01" />
            </p>
            <p>
              <label for="Creditos">Creditos:</label>
                <input type="number" name="Creditos" id="Creditos" />
            </p>
            <p>
              <label for="Optativa">Optativa:</label>
                <select name="Optativa" id="Optativa">
                  <option value="true">SÃ­</option>
                  <option value="false">No</option>
                </select>
            </p>

          <!-- Claves forÃ¡neas como select de entidades referenciadas -->
            <p>
              <label for="ref_Titulo">ID del Titulo:</label>
              <input type="text" name="ref_Titulo" id="ref_Titulo" placeholder="Referencia a Titulo" />
            </p>
            <p>
              <label for="ref_Profesor">ID del Profesor:</label>
              <input type="text" name="ref_Profesor" id="ref_Profesor" placeholder="Referencia a Profesor" />
            </p>
        </div>
    </div>

    <div class="actions">
      <button type="submit" class="button">Confirmar</button>
      <button type="reset" class="button">Cancelar</button>
      <a href="administrador/index.html" class="button">Volver</a>
    </div>
  </form>
</body>
</html>
